<html lang="zh-CN">
<head>

    <link rel="stylesheet" href="../../../css/style.css">

<!-- The code here is for demonstration purposes only; the actual parameters need to be supported based on the camera's capabilities. -->
<body>
    <div class="container">
        <div class="left-panel">
            <h2 class="section-title">LSKJ Photo Filter Tool</h2>

            <div id="tool-container">

                    <!-- 对比度滑块 -->

                    <!-- 饱和度滑条 -->

                        </div>

                    </div>

                    <!-- 高光滑条 -->
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>高光Highlight:</span>
                            <span id="highlightValue" class="slider-value">0</span>
                        </div>
                        <input type="range" id="highlightSlider" class="slider" min="-100" max="100" value="0">
                    </div>

                    <!-- 色温滑条 -->
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>色温Temperature:</span>
                            <span id="temperatureValue" class="slider-value">0</span>

                    <!-- 色调滑条 -->

                            <span id="tintValue" class="slider-value">0</span>
                        </div>
                        <input type="range" id="tintSlider" class="slider" min="-100" max="100" value="0">

                    <!-- RGB滑块 -->

                            <span id="redValue" class="slider-value">0</span>

                        <input type="range" id="redSlider" class="slider" min="-100" max="100" value="0">
                    </div>

                    <div class="slider-group">
                        <div class="slider-label">
                            <span>伽马Green:</span>
                            <span id="greenValue" class="slider-value">0</span>
                        </div>
                        <input type="range" id="greenSlider" class="slider" min="-100" max="100" value="0">
                    </div>

                    <div class="slider-group">
                        <div class="slider-label">
                            <span>伽马Blue:</span>
                            <span id="blueValue" class="slider-value">0</span>
                        </div>
                        <input type="range" id="blueSlider" class="slider" min="-100" max="100" value="0">
                    </div>

                    <!-- 颗粒感滑块 -->
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>颗粒感1 (随机白色噪点):</span>
                            <span id="grain1Value" class="slider-value">0</span>
                        </div>
                        <input type="range" id="grain1Slider" class="slider" min="0" max="100" value="0">
                    </div>

                    <div class="slider-group">
                        <div class="slider-label">
                            <span>颗粒感2 (随机RGB噪点):</span>
                            <span id="grain2Value" class="slider-value">0</span>
                        </div>
                        <input type="range" id="grain2Slider" class="slider" min="0" max="100" value="0">
                    </div>
            
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>颗粒感3 (规则排列):</span>
                            <span id="grain3Value" class="slider-value">0</span>
                        </div>
                        <input type="range" id="grain3Slider" class="slider" min="0" max="100" value="0">
                    </div>
            
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>颗粒感4 (贴图):</span>
                            <span id="grain4Value" class="slider-value">0</span>
                        </div>
                        <input type="range" id="grain4Slider" class="slider" min="0" max="100" value="0">
                    </div>
                </div>
                <!-- 按钮组1 -->
                <div class="button-group">
                    <button id="resetButton" class="reset-button">重置参数</button>
                    <button id="saveButton" class="save-button">保存图片</button>
                </div>

                <!-- 按钮组2 -->
                <div class="button-group">
                    <button id="importButton" class="import-button">导入参数文件</button>
                    <input type="file" id="fltfileInput" accept=".flt" style="display: none;">
                    <button id="exportButton" class="export-button">保存参数文件</button>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <h2 class="preview-title">Preview Of The Effect</h2>
            <div class="upload-area">
                <input type="file" id="image-upload" accept="image/*">
                <label for="image-upload" class="upload-button">Upload Image</label>
                <div class="canvas-container">
                    <div class="canvas-background"></div>
                    <canvas id="image-canvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>

    document.addEventListener('DOMContentLoaded', function() {
            const toolContainer = document.getElementById('tool-container');
            const imageUpload = document.getElementById('image-upload');
            const canvas = document.getElementById('image-canvas');
            const ctx = canvas.getContext('2d');
            
            
            let currentImage = null;
            
            // Initialize DIY Tool
            const diyTool = new DIYTool(toolContainer, ctx, canvas);
            
            //处理图片上传
            imageUpload.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    
                    reader.onload = async function(event) {
                        const img = new Image();
                        img.onload = async function() {
                            console.log('图片加载完成，原始尺寸:', img.width, 'x', img.height);

                            // 清除之前的图片
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);

                            //图片的横竖显示处理 - 简单处理，如果需要的话可以加上更复杂的逻辑
                            if(img.height > img.width){
                                document.documentElement.style.setProperty('--container-width', '512px');
                            }
                            else{
                                document.documentElement.style.setProperty('--container-width', '1024px');
                            }
                           
                            // 检查文件大小是否超过512K (512000 bytes) - 图片太大会导致页面卡顿
                            if (file.size > 512000) {
                                console.log('检测到大图片，进行压缩');
                                
                                const compressedImg = await compressImage(img, 512000);
                                currentImage = compressedImg;
                                
                                canvas.width = compressedImg.width;
                                canvas.height = compressedImg.height;
                                ctx.drawImage(compressedImg, 0, 0);
                                
                                // 通知工具图片已上传
                                diyTool.onImageUpload(compressedImg);
                            } else {
                                console.log('小图片，直接使用原图');
                                
                                currentImage = img;
                                canvas.width = img.width;
                                canvas.height = img.height;
                                ctx.drawImage(img, 0, 0);
                                
                                // 通知工具图片已上传
                                diyTool.onImageUpload(img);
                            }
                        };
                        img.onerror = function() {
                            console.error('图片加载失败');
                        };
                        img.src = event.target.result;
                    };
                    
                    reader.onerror = function() {
                        console.error('文件读取失败');
                    };
                    reader.readAsDataURL(file);
                }
            });

            /**
             * 压缩图片到指定大小以下
             * @param {Image} img - 原始图片对象
             * @param {number} maxSize - 最大字节数
             * @returns {Promise<Image>} - 压缩后的图片
             */
            async function compressImage(img, maxSize) {
                let quality = 0.9; // 初始质量
                let compressedBlob = null;
                let tempCanvas = document.createElement('canvas');
                let tempCtx = tempCanvas.getContext('2d');
                
                // 设置初始尺寸（保持宽高比）
                let width = img.width;
                let height = img.height;
                
                // 首先尝试调整尺寸
                const maxDimension = 2000; // 最大尺寸限制
                if (width > maxDimension || height > maxDimension) {
                    if (width > height) {
                        height *= maxDimension / width;
                        width = maxDimension;
                    } else {
                        width *= maxDimension / height;
                        height = maxDimension;
                    }
                }
                
                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCtx.drawImage(img, 0, 0, width, height);
                
                // 调整质量直到满足大小要求
                do {
                    compressedBlob = await new Promise(resolve => {
                        tempCanvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
                    });
                    
                    if (compressedBlob.size > maxSize) {
                        quality -= 0.1;
                        // 如果质量已经很低但大小仍然太大，进一步缩小尺寸
                        if (quality < 0.5 && compressedBlob.size > maxSize * 1.5) {
                            width *= 0.9;
                            height *= 0.9;
                            tempCanvas.width = width;
                            tempCanvas.height = height;
                            tempCtx.drawImage(img, 0, 0, width, height);
                        }
                    }
                } while (compressedBlob.size > maxSize && quality > 0.1);
                
                // 将压缩后的Blob转换为Image对象
                return new Promise((resolve, reject) => {
                    const compressedImg = new Image();
                    compressedImg.onload = () => resolve(compressedImg);
                    compressedImg.onerror = reject;
                    compressedImg.src = URL.createObjectURL(compressedBlob);
                });
            }
        });

        class DIYTool {
            constructor(container, ctx, canvas) {
                this.container = container;
                this.ctx = ctx;
                this.canvas = canvas;
                this.originalImageData = null;
                this.currentImageData = null;
                
                this.initEventListeners();
            }
            
            initEventListeners() {

                // 曝光滑条事件监听
                const exposureSlider = this.container.querySelector('#exposureSlider');
                const exposureValue = this.container.querySelector('#exposureValue');
                exposureSlider.addEventListener('input', () => {
                    exposureValue.textContent = exposureSlider.value;
                    this.applyAllAdjustments();
                });
                
                // 亮度滑条事件监听
                const brightnessSlider = this.container.querySelector('#brightnessSlider');
                const brightnessValue = this.container.querySelector('#brightnessValue');
                brightnessSlider.addEventListener('input', () => {
                    brightnessValue.textContent = brightnessSlider.value;
                    this.applyAllAdjustments();
                });

                // 对比度滑条事件监听
                const contrastSlider = this.container.querySelector('#contrastSlider');
                const contrastValue = this.container.querySelector('#contrastValue');
                contrastSlider.addEventListener('input', () => {
                    contrastValue.textContent = contrastSlider.value;
                    this.applyAllAdjustments();
                });

                // 饱和度滑条事件监听
                const saturationSlider = this.container.querySelector('#saturationSlider');
                const saturationValue = this.container.querySelector('#saturationValue');
                saturationSlider.addEventListener('input', () => {
                    saturationValue.textContent = saturationSlider.value;
                    this.applyAllAdjustments();
                });

                // 添加阴影滑条事件监听
                const shadowSlider = this.container.querySelector('#shadowSlider');
                const shadowValue = this.container.querySelector('#shadowValue');
                shadowSlider.addEventListener('input', () => {
                    shadowValue.textContent = shadowSlider.value;
                    this.applyAllAdjustments();
                });

                // 高光滑条事件监听
                const highlightSlider = this.container.querySelector('#highlightSlider');
                const highlightValue = this.container.querySelector('#highlightValue');
                highlightSlider.addEventListener('input', () => {
                    highlightValue.textContent = highlightSlider.value;
                    this.applyAllAdjustments();
                });

                // 色温滑条事件监听
                const tempSlider = this.container.querySelector('#temperatureSlider');
                const tempValue = this.container.querySelector('#temperatureValue');
                tempSlider.addEventListener('input', () => {
                    tempValue.textContent = tempSlider.value;
                    this.applyAllAdjustments();
                });

                // 色调滑条事件监听
                const tintSlider = this.container.querySelector('#tintSlider');
                const tintValue = this.container.querySelector('#tintValue');
                tintSlider.addEventListener('input', () => {
                    tintValue.textContent = tintSlider.value;
                    this.applyAllAdjustments();
                });

                // RGB滑块事件
                const redSlider = this.container.querySelector('#redSlider');
                const redValue = this.container.querySelector('#redValue');
                redSlider.addEventListener('input', () => {
                    redValue.textContent = redSlider.value;
                    this.applyAllAdjustments();
                });

                const greenSlider = this.container.querySelector('#greenSlider');
                const greenValue = this.container.querySelector('#greenValue');
                greenSlider.addEventListener('input', () => {
                    greenValue.textContent = greenSlider.value;
                    this.applyAllAdjustments();
                });

                const blueSlider = this.container.querySelector('#blueSlider');
                const blueValue = this.container.querySelector('#blueValue');
                blueSlider.addEventListener('input', () => {
                    blueValue.textContent = blueSlider.value;
                    this.applyAllAdjustments();
                });

                // 颗粒感滑块事件
                const grain1Slider = this.container.querySelector('#grain1Slider');
                const grain1Value = this.container.querySelector('#grain1Value');
                grain1Slider.addEventListener('input', () => {
                    grain1Value.textContent = grain1Slider.value;
                    this.applyAllAdjustments();
                });

                const grain2Slider = this.container.querySelector('#grain2Slider');
                const grain2Value = this.container.querySelector('#grain2Value');
                grain2Slider.addEventListener('input', () => {
                    grain2Value.textContent = grain2Slider.value;
                    this.applyAllAdjustments();
                });

                const grain3Slider = this.container.querySelector('#grain3Slider');
                const grain3Value = this.container.querySelector('#grain3Value');
                grain3Slider.addEventListener('input', () => {
                    grain3Value.textContent = grain3Slider.value;
                    this.applyAllAdjustments();
                });

                const grain4Slider = this.container.querySelector('#grain4Slider');
                const grain4Value = this.container.querySelector('#grain4Value');
                grain4Slider.addEventListener('input', () => {
                    grain4Value.textContent = grain4Slider.value;
                    this.applyAllAdjustments();
                });

                // RESET按钮事件
                const resetButton = this.container.querySelector('#resetButton');
                resetButton.addEventListener('click', () => {
                    this.resetAllSliders();
                    this.applyAllAdjustments();
                });

                // 保存图片按钮事件
                const saveButton = this.container.querySelector('#saveButton');
                saveButton.addEventListener('click', () => {
                    this.saveImage();
                });

                // EXPORT按钮事件
                const exportButton = this.container.querySelector('#exportButton');
                exportButton.addEventListener('click', () => this.handleExport());

                // IMPORT按钮事件
                const importButton = this.container.querySelector('#importButton');
                const fltfileInput = this.container.querySelector('#fltfileInput');
                importButton.addEventListener('click', () => fltfileInput.click());
                fltfileInput.addEventListener('change', (e) => this.handleFltImport(e));
            }
            
            onImageUpload(img) {

                 // 调试点A：检查接收到的图片信息
            console.log('A. DiyTool接收 - 图片尺寸:', img.width, 'x', img.height);
            console.log('A1. Canvas实际尺寸:', this.canvas.width, 'x', this.canvas.height);

                // 保持原始图片尺寸
                this.imgWidth = img.width;
                this.imgHeight = img.height;
                
                // 设置canvas尺寸
                this.canvas.width = this.imgWidth;
                this.canvas.height = this.imgHeight;
                
                // 绘制图像并保存原始数据
                this.ctx.drawImage(img, 0, 0, this.canvas.width, this.canvas.height);
                this.originalImageData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height);
                this.currentImageData = new ImageData(
                    new Uint8ClampedArray(this.originalImageData.data),
                    this.originalImageData.width,
                    this.originalImageData.height
                );
                
                // 重置所有滑条
                this.resetAllSliders();
            }
            
            resetAllSliders() {
                const sliders = [
                    { id: 'exposureSlider', valueId: 'exposureValue', defaultValue: 0 },
                    { id: 'brightnessSlider', valueId: 'brightnessValue', defaultValue: 0 },
                    { id: 'contrastSlider', valueId: 'contrastValue', defaultValue: 0 },
                    { id: 'saturationSlider', valueId: 'saturationValue', defaultValue: 0 },
                    { id: 'highlightSlider', valueId: 'highlightValue', defaultValue: 0 },
                    { id: 'shadowSlider', valueId: 'shadowValue', defaultValue: 0 },
                    { id: 'temperatureSlider', valueId: 'temperatureValue', defaultValue: 0 },
                    { id: 'tintSlider', valueId: 'tintValue', defaultValue: 0 },
                    { id: 'redSlider', valueId: 'redValue', defaultValue: 0 },
                    { id: 'greenSlider', valueId: 'greenValue', defaultValue: 0 },
                    { id: 'blueSlider', valueId: 'blueValue', defaultValue: 0 },
                    { id: 'grain1Slider', valueId: 'grain1Value', defaultValue: 0 },
                    { id: 'grain2Slider', valueId: 'grain2Value', defaultValue: 0 },
                    { id: 'grain3Slider', valueId: 'grain3Value', defaultValue: 0 },
                    { id: 'grain4Slider', valueId: 'grain4Value', defaultValue: 0 }
                ];
                
                sliders.forEach(slider => {
                    const element = this.container.querySelector(`#${slider.id}`);
                    const valueElement = this.container.querySelector(`#${slider.valueId}`);
                    if (element && valueElement) {
                        element.value = slider.defaultValue;
                        valueElement.textContent = slider.defaultValue;
                    }
                });
            }
            
            applyAllAdjustments() {
                if (!this.originalImageData) return;
                
                // 从原始数据开始
                this.currentImageData = new ImageData(
                    new Uint8ClampedArray(this.originalImageData.data),
                    this.originalImageData.width,
                    this.originalImageData.height
                );
                
                // 获取当前各参数的滑块值
                const exposureValue = parseInt(this.container.querySelector('#exposureSlider').value);
                const brightnessValue = parseInt(this.container.querySelector('#brightnessSlider').value);
                const contrastValue = parseInt(this.container.querySelector('#contrastSlider').value);
                const saturationValue = parseInt(this.container.querySelector('#saturationSlider').value);
                const shadowValue = parseInt(this.container.querySelector('#shadowSlider').value);
                const highlightValue = parseInt(this.container.querySelector('#highlightSlider').value);
                const temperatureValue = parseInt(this.container.querySelector('#temperatureSlider').value);
                const tintValue = parseInt(this.container.querySelector('#tintSlider').value);
                const redValue = parseInt(this.container.querySelector('#redSlider').value);
                const greenValue = parseInt(this.container.querySelector('#greenSlider').value);
                const blueValue = parseInt(this.container.querySelector('#blueSlider').value);
                const grain1Value = parseInt(this.container.querySelector('#grain1Slider').value);
                const grain2Value = parseInt(this.container.querySelector('#grain2Slider').value);
                const grain3Value = parseInt(this.container.querySelector('#grain3Slider').value);
                const grain4Value = parseInt(this.container.querySelector('#grain4Slider').value);
                
                // 各种颗粒效果 - 这个最好优先处理
                if (grain1Value > 0) {
                    this.applyRandomGrainEffect(this.currentImageData, grain1Value);
                }
                if (grain2Value > 0) {
                    this.applyRandomGrainEffect_RGB(this.currentImageData, grain2Value);
                }
                if (grain3Value > 0) {
                    this.applyPositionalGrainEffect(this.currentImageData, grain3Value);
                }
                if (grain4Value > 0) {
                    this.applyPicGrainEffect(this.currentImageData, grain4Value);
                }

                // 应用曝光调整(先应用曝光，因为它是非线性调整)
                if (exposureValue !== 0) {
                    this.applyExposureEffect(this.currentImageData, exposureValue);
                }
                
                // 应用亮度调整(后应用亮度，因为它是线性调整)
                if (brightnessValue !== 0) {
                    this.applyBrightnessEffect(this.currentImageData, brightnessValue);
                }

                // 对比度调整
                if (contrastValue !== 0) {
                    this.applyContrastEffect(this.currentImageData, contrastValue);
                }

                // 饱和度调整
                if (saturationValue !== 0) {
                    this.applySaturationEffect(this.currentImageData, saturationValue);
                }

                // 阴影调整
                if (shadowValue !== 0) {
                    this.applyShadowEffect(this.currentImageData, shadowValue);
                }

                // 高光调整
                if (highlightValue !== 0) {
                    this.applyHighlightEffect(this.currentImageData, highlightValue);
                }

                // 色温调整
                this.applyTemperatureEffect(this.currentImageData, temperatureValue);

                // 色调调整
                this.applyTintEffect(this.currentImageData, tintValue);

                // RGB调整 - 这个最好放在最后处理
                this.applyRGBAdjustment(this.currentImageData, redValue, greenValue, blueValue);
                
                // 输出结果到canvas
                this.ctx.putImageData(this.currentImageData, 0, 0);
            }


            /**
             * 应用曝光效果调整
             * @param {ImageData} imageData - 图像像素数据
             * @param {number} exposureValue - 曝光调整值(-100到100)
             * - 正值: 增加曝光(提亮图像，增强高光)
             * - 负值: 减少曝光(压暗图像，保护高光)
             */  
            applyExposureEffect(imageData, exposureValue) {
            // 创建查找表（只在曝光值变化时创建）
            if (!this.exposureLUT || this.lastExposure !== exposureValue) {
                this.exposureLUT = new Uint8ClampedArray(256);
                const exposure = Math.pow(2, exposureValue / 50);
                
                for (let i = 0; i < 256; i++) {
                    const value = i / 255;
                    let adjusted;
                    
                    if (exposureValue > 0) {
                        adjusted = 1 - Math.pow(1 - value, exposure);
                    } else {
                        adjusted = Math.pow(value, 1/exposure);
                    }
                    
                    this.exposureLUT[i] = adjusted * 255;
                }
                this.lastExposure = exposureValue;
            }
            
            // 使用查找表应用曝光
            for (let i = 0; i < imageData.data.length; i += 4) {
                imageData.data[i] = this.exposureLUT[imageData.data[i]];
                imageData.data[i+1] = this.exposureLUT[imageData.data[i+1]];
                imageData.data[i+2] = this.exposureLUT[imageData.data[i+2]];
            }
        }

            
            /**
             * 应用亮度效果调整

            }

            for (let i = 0; i < imageData.data.length; i += 4) {
                imageData.data[i] = this.clamp(factor * (imageData.data[i] - 128) + 128);
                imageData.data[i+1] = this.clamp(factor * (imageData.data[i+1] - 128) + 128);

                    const r = imageData.data[i];

            // RGB调整
            applyRGBAdjustment(imageData, redValue, greenValue, blueValue) {
                const rangeSettings = {
                    red: { min: -60, default: 0, max: 60 },
                    green: { min: -60, default: 0, max: 60 },
                    blue: { min: -60, default: 0, max: 60 }
                };
            
                // 计算各通道调整值
                const calcAdjustment = (value, channel) => {
                    const { min, default: def, max } = rangeSettings[channel];
                    if (value < 0) {
                        return def + (value / 100) * (def - min);
                    } else if (value === 0) {
                        return def;
                    } else {
                        return def + (value / 100) * (max - def);
                    }
                };
            
                let rAdj = calcAdjustment(redValue, 'red');
                let gAdj = calcAdjustment(greenValue, 'green');
                let bAdj = calcAdjustment(blueValue, 'blue');
            
                // 计算总强度
                const totalAdjustment = Math.sqrt(rAdj ** 2 + gAdj ** 2 + bAdj ** 2);
            
                // 动态选择强度限制系数
                const maxStrengthPercentage = this.shouldUseStrictLimit(rAdj, gAdj, bAdj) ? 0.35 : 0.5;
                const maxTotalAdjustment = 103.92 * maxStrengthPercentage;
            
                // 强度限制
                if (totalAdjustment > maxTotalAdjustment) {
                    const scale = maxTotalAdjustment / totalAdjustment;
                    rAdj *= scale;
                    gAdj *= scale;
                    bAdj *= scale;
                }
            
                // 应用调整
                for (let i = 0; i < imageData.data.length; i += 4) {
                    imageData.data[i] = this.clamp(imageData.data[i] + rAdj);
                    imageData.data[i+1] = this.clamp(imageData.data[i+1] + gAdj);
                    imageData.data[i+2] = this.clamp(imageData.data[i+2] + bAdj);

            /**

             * @param {ImageData} imageData - 图像像素数据对象 (包含width, height和data属性)
             * @param {number} intensity - 噪点强度 (建议范围0-1，值越大噪点越明显)
             * @param {number} [density=0.3] - 噪点密度 (0-1之间，0表示无噪点，1表示全图噪点)
             * @param {number} [blockSize=1] - 噪点块大小 (1为单像素噪点，大于1会产生块状噪点效果)
             * @example
             * // 对图像应用中等强度、稀疏的单像素噪点
             * applyRandomGrainEffect(imageData, 0.5, 0.3, 1);
             * 
             * // 对图像应用高强度、密集的4x4块状噪点
             * applyRandomGrainEffect(imageData, 0.8, 0.7, 4);
             */
            applyRandomGrainEffect(imageData, intensity, density = 0.3, blockSize = 2) {
                const grainAmount = intensity * 0.7;
                const width = imageData.width;
                const height = imageData.height;
                
                for (let y = 0; y < height; y += blockSize) {
                    for (let x = 0; x < width; x += blockSize) {
                        if (Math.random() > density) continue;
                        
                        const grainR = (Math.random() - 0.5) * grainAmount;
                        const grainG = (Math.random() - 0.5) * grainAmount;
                        const grainB = (Math.random() - 0.5) * grainAmount;
                        const grainValue_wihte = (Math.random() - 0.5) * grainAmount;
                        
                        for (let dy = 0; dy < blockSize && y + dy < height; dy++) {
                            for (let dx = 0; dx < blockSize && x + dx < width; dx++) {
                                const idx = ((y + dy) * width + (x + dx)) * 4;

                                imageData.data[idx] = this.clamp(imageData.data[idx] + grainValue_wihte);
                                imageData.data[idx+1] = this.clamp(imageData.data[idx+1] + grainValue_wihte);
                                imageData.data[idx+2] = this.clamp(imageData.data[idx+2] + grainValue_wihte);
                            }
                        }
                    }
                }
            }

            /**
             * 应用随机RGB颗粒效果到图像数据
             * @param {ImageData} imageData - 图像像素数据对象 (包含width, height和data属性)
             * @param {number} intensity - 噪点强度 (建议范围0-1，值越大噪点越明显)
             * @param {number} [density=0.3] - 噪点密度 (0-1之间，0表示无噪点，1表示全图噪点)

             * @example

             * 
             * applyRandomGrainEffect(imageData, 0.8, 0.7, 4);// 对图像应用高强度、密集的4x4块状噪点
             */
             applyRandomGrainEffect_RGB(imageData, intensity, density = 0.3, blockSize = 1) {
                const grainAmount = intensity * 0.7;
                const width = imageData.width;
                const height = imageData.height;
                
                for (let y = 0; y < height; y += blockSize) {
                    for (let x = 0; x < width; x += blockSize) {
                        // 控制稀疏度
                        if (Math.random() > density) continue;
                        /**
                        * 如果grainR较大，grainG和grainB较小，噪点会偏红色。
                        * 如果grainG较大，grainR和grainB较小，噪点会偏绿色。
                        * 如果grainB较大，grainR和grainG较小，噪点会偏蓝色。
                        * 如果grainR、grainG、grainB都较大，噪点会接近白色。
                        * 如果grainR、grainG、grainB都较小，噪点会接近黑色。
                         */
                        // Math.random() - 0.5 会生成一个范围在-0.5到0.5之间的随机数，实现随机的明暗效果，更加自然
                        const grainR = (Math.random() - 0.5) * grainAmount;
                        const grainG = (Math.random() - 0.5) * grainAmount;
                        const grainB = (Math.random() - 0.5) * grainAmount;
                        // 应用噪点到整个区块
                        for (let dy = 0; dy < blockSize && y + dy < height; dy++) {
                            for (let dx = 0; dx < blockSize && x + dx < width; dx++) {
                                const idx = ((y + dy) * width + (x + dx)) * 4;

                                imageData.data[idx] = this.clamp(imageData.data[idx] + grainR);
                                imageData.data[idx+1] = this.clamp(imageData.data[idx+1] + grainG);
                                imageData.data[idx+2] = this.clamp(imageData.data[idx+2] + grainB);
                            }
                        }
                    }
                }
            }

            applyPositionalGrainEffect(imageData, intensity) {
                const grainAmount = intensity * 0.5;
                const width = imageData.width;
                
                for (let i = 0; i < imageData.data.length; i += 4) {
                    const x = (i / 4) % width;
                    const y = Math.floor((i / 4) / width);
                    
                    // 使用像素位置作为随机种子，产生相关噪声
                    const seed = (x * 12345 + y * 67890) % 100000;
                    const random = (seed * 9301 + 49297) % 233280 / 233280;
                    
                    const grainR = (random - 0.5) * grainAmount;
                    const grainG = ((random * 1.3) % 1 - 0.5) * grainAmount;
                    const grainB = ((random * 1.7) % 1 - 0.5) * grainAmount;

                    imageData.data[i+1] = this.clamp(imageData.data[i+1] + grainG);
                    imageData.data[i+2] = this.clamp(imageData.data[i+2] + grainB);
                }
            }

                }

         * 判断是否使用更严格的限制
         * @param {number} rAdj - 红色通道调整值
         * @param {number} gAdj - 绿色通道调整值
         * @param {number} bAdj - 蓝色通道调整值
         * @returns {boolean} - 是否使用更严格的限制
         */
        
        // 判断是否使用更严格的限制
        shouldUseStrictLimit(rAdj, gAdj, bAdj) {
            // 情况1：两个或以上通道为负值
            const negativeCount = [rAdj, gAdj, bAdj].filter(v => v < 0).length;
            if (negativeCount >= 2) return true;
        
            // 情况2：影响最大的通道是负值
            const maxImpactValue = Math.max(
                Math.abs(rAdj), 
                Math.abs(gAdj), 
                Math.abs(bAdj)
            );
            return [rAdj, gAdj, bAdj].some(v => 
                Math.abs(v) === maxImpactValue && v < 0
            );
        }

        clamp(value) {
            return Math.max(0, Math.min(255, value));
        }
            
        /**
        * 保存当前图像为PNG文件
        */
        async saveImage() {
            if (!this.currentImageData) {
                alert('请先上传图片并应用效果');
                return;
            }

            // 创建一个临时canvas来确保保存的是当前显示的效果
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = this.canvas.width;
            tempCanvas.height = this.canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            // 绘制当前效果到临时canvas
            tempCtx.putImageData(this.currentImageData, 0, 0);

            // 将canvas转换为Blob
            tempCanvas.toBlob(async (blob) => {
                try {
                    // 生成默认文件名
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                    const defaultFileName = `webToolImg-${timestamp}.png`;

                    // 优先尝试使用现代API
                    if (window.showSaveFilePicker) {
                        try {
                            const handle = await window.showSaveFilePicker({
                                suggestedName: defaultFileName, // 默认文件名
                                types: [{
                                    description: 'PNG Files',
                                    accept: { 'image/png': ['.png'] }
                                }]
                            });
                            const writable = await handle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                            return; // 成功保存后直接返回
                        } catch (error) {
                            if (error.name !== 'AbortError') {
                                // 不是用户取消的错误才继续尝试兼容方案
                                throw error;
                            }
                            // 用户取消操作，直接返回不执行后续操作
                            return;
                        }
                    }

                    // 现代API不可用或失败时使用兼容方案
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = defaultFileName; // 使用默认文件名
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    console.error('保存图片失败:', error);
                    alert('保存图片失败，请重试或检查浏览器支持情况。');
                }
            }, 'image/png');
        }

        // 解析参数文本文件
        parseFltFile(content) {
            const fltParams = {
                exposureValue: 0,
                brightnessValue: 0,
                contrastValue: 0,
                saturationValue: 0,
                shadowValue: 0,
                highlightValue: 0,
                temperatureValue: 0,
                tintValue: 0,
                redValue: 0,
                greenValue: 0,
                blueValue: 0,
                grain1Value: 0,
                grain2Value: 0,
                grain3Value: 0,
                grain4Value: 0 
            };

            const lines = content.split('\n');
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line && line.includes(':')) {
                    const parts = line.split(':');
                    const key = parts[0].trim();  // 移除toLowerCase()
                    const value = parseFloat(parts[1].trim()) || 0;
                    
                    if (key in fltParams) {
                        fltParams[key] = value;
                    }
                }
            } 
            return fltParams;
        }
